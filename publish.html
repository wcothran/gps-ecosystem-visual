<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPS Ecosystem — Preview & Publish</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <style>
    /* SCDE design tokens — same as index.html */
    :root {
      --primary:        210 24% 24%;
      --primary-foreground: 0 0% 98%;
      --brand-gold:     38 84% 64%;
      --brand-teal:     202 35% 40%;
      --brand-navy:     208 43% 24%;
      --brand-cream:    38 100% 90%;
      --brand-slate:    212 21% 56%;
      --brand-alice:    208 100% 97%;
      --background:     0 0% 100%;
      --foreground:     240 10% 3.9%;
      --card:           0 0% 100%;
      --muted:          240 4.8% 95.9%;
      --muted-foreground: 240 3.8% 46.1%;
      --border:         240 5.9% 90%;
      --ring:           210 24% 24%;
      --input:          240 5.9% 90%;
      --destructive:    0 72% 51%;
      --warning:        38 92% 50%;
      --info:           199 89% 48%;
      --radius-sm: 4px;
      --radius:    8px;
      --radius-lg: 12px;
      --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.08);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.08);
      --font-heading: 'Poppins', 'Aptos', 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-body:    'Aptos', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: hsl(var(--brand-alice)); color: hsl(var(--foreground)); font-family: var(--font-body); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    #root { max-width: 1400px; margin: 0 auto; padding: 24px 28px; }
    h1, h2, h3, .card-title, .dialog-title, .alert-title { font-family: var(--font-heading); }

    /* ------------ Banner (publisher header bar) ------------ */
    .pub-banner {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: var(--shadow-xs);
    }
    .pub-banner-text { font-size: 14px; color: hsl(var(--foreground)); line-height: 1.5; }
    .pub-banner-text strong { font-family: var(--font-heading); color: hsl(var(--primary)); font-weight: 600; }
    .pub-banner-text .pub-filename { color: hsl(var(--brand-teal)); font-weight: 600; }
    .pub-banner-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ------------ Buttons (SCDE pattern) ------------ */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      height: 36px; padding: 0 16px;
      border-radius: var(--radius);
      font-size: 13px; font-weight: 500;
      font-family: var(--font-body);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.15s ease, opacity 0.15s ease;
      white-space: nowrap;
    }
    .btn-primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }
    .btn-primary:hover { background: hsl(var(--primary) / 0.9); }
    .btn-outline { background: transparent; border-color: hsl(var(--border)); color: hsl(var(--foreground)); }
    .btn-outline:hover { background: hsl(var(--muted)); }

    /* ------------ Dropzone ------------ */
    .pub-dropzone {
      border: 2px dashed hsl(var(--brand-slate));
      background: hsl(var(--card));
      border-radius: var(--radius-lg);
      padding: 56px 32px;
      text-align: center;
      margin: 48px auto;
      max-width: 640px;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .pub-dropzone.over {
      background: hsl(var(--brand-teal) / 0.06);
      border-color: hsl(var(--brand-teal));
    }
    .pub-dropzone h2 { font-size: 24px; font-weight: 600; letter-spacing: -0.01em; color: hsl(var(--primary)); margin-bottom: 8px; }
    .pub-dropzone p { font-size: 14px; line-height: 1.6; color: hsl(var(--muted-foreground)); margin-bottom: 20px; max-width: 480px; margin-left: auto; margin-right: auto; }
    .pub-dropzone .pub-filehint { font-size: 12px; color: hsl(var(--muted-foreground)); margin-top: 16px; }
    .pub-filepicker { display: none; }
    .pub-pick-label {
      display: inline-flex; align-items: center; justify-content: center;
      background: hsl(var(--primary)); color: hsl(var(--primary-foreground));
      padding: 0 16px; height: 36px;
      border-radius: var(--radius);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .pub-pick-label:hover { background: hsl(var(--primary) / 0.9); }

    /* ------------ Visual styles (mirror index.html so the preview is exact) ------------ */
    .gps-titleblock { text-align: center; margin-bottom: 24px; }
    .gps-title { font-size: 30px; font-weight: 600; letter-spacing: -0.02em; color: hsl(var(--primary)); line-height: 1.2; margin-bottom: 8px; }
    .gps-definition { font-size: 14px; color: hsl(var(--muted-foreground)); line-height: 1.6; max-width: 880px; margin: 0 auto; }

    /* Scope toggle (SCDE Tabs pattern) */
    .scope-toggle-wrap { display: flex; justify-content: center; margin: 0 0 20px; }
    .scope-toggle { display: inline-flex; background: hsl(var(--muted)); padding: 4px; border-radius: var(--radius); gap: 2px; }
    .scope-toggle-trigger { padding: 8px 16px; font-size: 13px; font-weight: 500; font-family: var(--font-body); border: none; background: transparent; border-radius: calc(var(--radius) - 2px); cursor: pointer; color: hsl(var(--muted-foreground)); transition: background 0.15s ease, color 0.15s ease; }
    .scope-toggle-trigger:hover { color: hsl(var(--foreground)); }
    .scope-toggle-trigger.active { background: hsl(var(--background)); color: hsl(var(--foreground)); box-shadow: var(--shadow-xs); }

    .gps-grid { display: grid; grid-template-columns: 200px 1fr 200px; gap: 16px; align-items: stretch; }
    .gps-center-stack { display: flex; flex-direction: column; gap: 12px; }
    .gps-footnote { margin-top: 16px; font-size: 12px; color: hsl(var(--muted-foreground)); text-align: right; }
    .future-star { color: hsl(var(--brand-gold)); font-weight: 700; margin-left: 3px; }

    .card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius-lg); box-shadow: var(--shadow-xs); }
    .card-title { font-size: 16px; font-weight: 600; line-height: 1.25; color: hsl(var(--foreground)); }
    .card-desc  { font-size: 12px; font-weight: 400; line-height: 1.5; color: hsl(var(--muted-foreground)); margin-top: 4px; }
    .band { padding: 16px 20px; display: grid; grid-template-columns: 180px 1fr; gap: 16px; align-items: start; border-left-width: 4px; border-left-style: solid; }
    .rail { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .rail-header { display: flex; flex-direction: column; gap: 4px; margin-bottom: 4px; }

    .tile {
      display: grid; grid-template-columns: 14px 1fr 14px; gap: 8px;
      align-items: center; text-align: center;
      background: hsl(var(--card)); color: hsl(var(--foreground));
      border: 1px solid hsl(var(--border)); border-radius: var(--radius);
      padding: 8px 10px; min-height: 36px;
      font-size: 13px; font-weight: 500; line-height: 1.25;
      cursor: pointer; box-shadow: var(--shadow-xs);
      font-family: var(--font-body);
      transition: border-color 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, color 0.12s ease;
    }
    .tile:hover { border-color: hsl(var(--ring) / 0.45); }
    .tile.is-active { color: hsl(var(--primary-foreground)); box-shadow: var(--shadow-md); }
    .tile-icon-slot { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; color: hsl(var(--muted-foreground)); }
    .tile-icon-slot svg { width: 100%; height: 100%; }
    .tile.is-active .tile-icon-slot { color: hsl(var(--primary-foreground) / 0.85); }
    .tile-label { text-align: center; line-height: 1.25; }
    .tile-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .tile-grid-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; }

    /* Legend strip + dialog meta row (matches index.html) */
    .gps-legend { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 18px 24px; align-items: center; justify-content: center; font-size: 12px; color: hsl(var(--muted-foreground)); }
    .gps-legend-group { display: inline-flex; align-items: center; gap: 14px; }
    .gps-legend-item  { display: inline-flex; align-items: center; gap: 6px; }
    .gps-legend-item svg { width: 14px; height: 14px; flex-shrink: 0; color: hsl(var(--foreground) / 0.7); }
    .gps-legend-divider { width: 1px; height: 14px; background: hsl(var(--border)); display: inline-block; }
    .dialog-meta { display: flex; flex-wrap: wrap; gap: 8px 16px; padding: 10px 12px; background: hsl(var(--muted)); border-radius: var(--radius); font-size: 12px; color: hsl(var(--muted-foreground)); }
    .dialog-meta-item { display: inline-flex; align-items: center; gap: 6px; }
    .dialog-meta-item svg { width: 14px; height: 14px; color: hsl(var(--foreground)); }
    .dialog-meta-label { font-weight: 600; color: hsl(var(--foreground)); }

    .dialog-overlay { position: fixed; inset: 0; background: rgb(0 0 0 / 0.12); z-index: 50; }
    .dialog {
      position: fixed; top: 20px; right: 20px;
      width: 360px; max-height: calc(100vh - 40px);
      background: hsl(var(--card)); border: 1px solid hsl(var(--border));
      border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
      z-index: 60; overflow: hidden;
      display: flex; flex-direction: column;
      animation: dialogIn 0.18s ease-out;
    }
    @keyframes dialogIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .dialog-header { padding: 14px 16px; color: hsl(var(--primary-foreground)); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .dialog-title { font-size: 16px; font-weight: 600; line-height: 1.25; }
    .dialog-body { padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .dialog-desc { font-size: 14px; line-height: 1.6; color: hsl(var(--foreground)); }
    .dialog-close { background: rgb(255 255 255 / 0.18); border: none; color: hsl(var(--primary-foreground)); width: 28px; height: 28px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .dialog-close:hover { background: rgb(255 255 255 / 0.28); }

    .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500; line-height: 1.5; border: 1px solid transparent; }
    .badge-secondary { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
    .badge-group { display: flex; flex-wrap: wrap; gap: 4px; }
    .eyebrow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: hsl(var(--muted-foreground)); margin-bottom: 8px; }

    .alert { display: flex; gap: 12px; padding: 12px 14px; border: 1px solid hsl(var(--border)); border-radius: var(--radius); background: hsl(var(--background)); align-items: flex-start; }
    .alert-icon { flex-shrink: 0; width: 16px; height: 16px; margin-top: 2px; }
    .alert-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .alert-desc { font-size: 12px; color: hsl(var(--muted-foreground)); line-height: 1.5; }
    .alert-warning { border-color: hsl(var(--warning) / 0.4); background: hsl(var(--warning) / 0.05); }
    .alert-warning .alert-icon { color: hsl(var(--warning)); }
    .alert-info { border-color: hsl(var(--info) / 0.3); background: hsl(var(--info) / 0.05); }
    .alert-info .alert-icon { color: hsl(var(--info)); }
    .alert a { color: hsl(var(--primary)); font-weight: 600; text-decoration: underline; text-underline-offset: 3px; }

    .gps-state { padding: 64px 24px; text-align: center; font-size: 14px; color: hsl(var(--muted-foreground)); font-family: var(--font-body); }
    .gps-state.error { color: hsl(var(--destructive)); }
    .gps-state small { display: block; margin-top: 8px; font-size: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
  // =====================================================================
  // GPS Ecosystem — preview & publish helper
  //
  // Drag a GPS-Ecosystem.xlsx onto this page (or pick one). The page renders
  // the visual exactly as the public viewer will, so you can preview a change
  // before uploading the file to the public host. Also useful for local dev
  // since it skips the fetch() that file:// blocks.
  // =====================================================================

  const ACCENT_HSL = {
    'Audiences':     '38 84% 64%',
    'Tools & Apps':  '208 43% 24%',
    'Outputs':       '208 43% 24%',
    'Data Services': '202 35% 40%',
    'Inputs':        '202 35% 40%',
    'Foundation':    '210 24% 24%',
    'Governance':    '212 21% 56%',
  };

  function parseWorkbook(buf) {
    const wb = XLSX.read(buf, { type: 'array' });
    const itemsRows = XLSX.utils.sheet_to_json(wb.Sheets['Items'] || {});
    const settingsRows = XLSX.utils.sheet_to_json(wb.Sheets['Settings'] || {});
    const itemsBySection = {};
    for (const r of itemsRows) {
      const section = (r.Section || '').toString().trim();
      if (!section || !r.Name) continue;
      const futureRaw = r.Future;
      const isFuture = futureRaw === true
        || (typeof futureRaw === 'string' && futureRaw.trim().toUpperCase() === 'TRUE');
      const dashboards = r.Dashboards
        ? r.Dashboards.toString().split(';').map(s => s.trim()).filter(Boolean)
        : [];
      const rawScope = (r.Scope || '').toString().trim();
      const item = {
        name: r.Name.toString().trim(),
        short: (r.Short || '').toString().trim(),
        desc: (r.Description || '').toString().trim(),
        future: isFuture,
        type: (r.Type || '').toString().trim(),
        flow: (r.Flow || '').toString().trim(),
        scope: ['Essential', 'Current', 'Future'].includes(rawScope) ? rawScope : 'Current',
        dashboards,
        docURL: (r.DocURL || '').toString().trim(),
        order: (r.Order != null && r.Order !== '') ? Number(r.Order) : null,
      };
      (itemsBySection[section] ||= []).push(item);
    }
    for (const sec of Object.keys(itemsBySection)) {
      itemsBySection[sec].sort((a, b) => {
        if (a.order == null && b.order == null) return 0;
        if (a.order == null) return 1;
        if (b.order == null) return -1;
        return a.order - b.order;
      });
    }
    const settings = {};
    for (const r of settingsRows) {
      if (r.Key) settings[r.Key.toString().trim()] = (r.Value || '').toString();
    }
    return { itemsBySection, settings };
  }

  // Lucide icon set (1.75 stroke) — Type icons and Flow arrows
  function MonitorSvg() {
    return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2" /><line x1="8" y1="21" x2="16" y2="21" /><line x1="12" y1="17" x2="12" y2="21" /></svg>);
  }
  function DatabaseSvg() {
    return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
      <ellipse cx="12" cy="5" rx="9" ry="3" /><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5" /><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3" /></svg>);
  }
  function CogSvg() {
    return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="3" />
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>);
  }
  function ArrowRightSvg() {
    return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
      <line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg>);
  }
  function ArrowLeftSvg() {
    return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
      <line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></svg>);
  }
  function ArrowLeftRightSvg() {
    return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
      <line x1="3" y1="12" x2="21" y2="12" /><polyline points="7 8 3 12 7 16" /><polyline points="17 8 21 12 17 16" /></svg>);
  }
  function TypeIcon({ type }) {
    if (type === 'App')     return <MonitorSvg />;
    if (type === 'Data')    return <DatabaseSvg />;
    if (type === 'Service') return <CogSvg />;
    return null;
  }
  function FlowIcon({ flow }) {
    if (flow === 'In')            return <ArrowRightSvg />;
    if (flow === 'Out')           return <ArrowLeftSvg />;
    if (flow === 'Bidirectional') return <ArrowLeftRightSvg />;
    return null;
  }
  function flowLabel(flow) {
    if (flow === 'In')            return 'Into GPS';
    if (flow === 'Out')           return 'Out of GPS';
    if (flow === 'Bidirectional') return 'Bidirectional';
    return flow;
  }
  function Legend() {
    return (
      <div className="gps-legend" aria-label="Legend">
        <span className="gps-legend-group">
          <span className="gps-legend-item"><MonitorSvg /> App</span>
          <span className="gps-legend-item"><DatabaseSvg /> Data</span>
          <span className="gps-legend-item"><CogSvg /> Service</span>
        </span>
        <span className="gps-legend-divider" />
        <span className="gps-legend-group">
          <span className="gps-legend-item"><ArrowRightSvg /> Into GPS</span>
          <span className="gps-legend-item"><ArrowLeftSvg /> Out of GPS</span>
          <span className="gps-legend-item"><ArrowLeftRightSvg /> Bidirectional</span>
        </span>
      </div>
    );
  }

  function Tile({ item, accentHsl, isActive, onSelect }) {
    const activeStyle = isActive ? { background: `hsl(${accentHsl})`, borderColor: `hsl(${accentHsl})` } : {};
    return (
      <button type="button" className={'tile' + (isActive ? ' is-active' : '')}
        onClick={() => onSelect(item, accentHsl)} style={activeStyle}
        title={[item.type && `Type: ${item.type}`, item.flow && `Flow: ${item.flow}`].filter(Boolean).join(' · ')}>
        <span className="tile-icon-slot"><TypeIcon type={item.type} /></span>
        <span className="tile-label">{item.short || item.name}
          {item.future && <span className="future-star">*</span>}
        </span>
        <span className="tile-icon-slot"><FlowIcon flow={item.flow} /></span>
      </button>
    );
  }

  function Band({ title, subtitle, accentHsl, children }) {
    return (
      <div className="card band" style={{
        background: `hsl(${accentHsl} / 0.06)`,
        borderColor: `hsl(${accentHsl} / 0.2)`,
        borderLeftColor: `hsl(${accentHsl})`,
      }}>
        <div>
          <div className="card-title">{title}</div>
          <div className="card-desc">{subtitle}</div>
        </div>
        <div className="tile-grid">{children}</div>
      </div>
    );
  }

  function Rail({ title, subtitle, accentHsl, children }) {
    return (
      <div className="card rail" style={{
        background: `linear-gradient(180deg, hsl(${accentHsl} / 0.13) 0%, hsl(${accentHsl} / 0.04) 100%)`,
        borderColor: `hsl(${accentHsl} / 0.25)`,
      }}>
        <div className="rail-header">
          <div className="card-title">{title}</div>
          <div className="card-desc">{subtitle}</div>
        </div>
        {children}
      </div>
    );
  }

  function AlertTriangleIcon() {
    return (
      <svg className="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
    );
  }
  function InfoCircleIcon() {
    return (
      <svg className="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="16" x2="12" y2="12" />
        <line x1="12" y1="8" x2="12.01" y2="8" />
      </svg>
    );
  }

  function DetailDialog({ item, accentHsl, onClose }) {
    if (!item) return null;
    const a = accentHsl || '210 24% 24%';
    return (
      <>
        <div className="dialog-overlay" onClick={onClose} />
        <div className="dialog" role="dialog" aria-modal="true">
          <div className="dialog-header" style={{ background: `hsl(${a})` }}>
            <h3 className="dialog-title">{item.name}</h3>
            <button className="dialog-close" type="button" aria-label="Close" onClick={onClose}>✕</button>
          </div>
          <div className="dialog-body">
            <p className="dialog-desc">{item.desc}</p>
            {(item.type || item.flow) && (
              <div className="dialog-meta">
                {item.type && (
                  <span className="dialog-meta-item">
                    <TypeIcon type={item.type} />
                    <span><span className="dialog-meta-label">Type:</span> {item.type}</span>
                  </span>
                )}
                {item.flow && (
                  <span className="dialog-meta-item">
                    <FlowIcon flow={item.flow} />
                    <span><span className="dialog-meta-label">Data flow:</span> {flowLabel(item.flow)}</span>
                  </span>
                )}
              </div>
            )}
            {item.dashboards && item.dashboards.length > 0 && (
              <div>
                <div className="eyebrow">Dashboards</div>
                <div className="badge-group">
                  {item.dashboards.map((d, i) => <span key={i} className="badge badge-secondary">{d}</span>)}
                </div>
              </div>
            )}
            {item.future && (
              <div className="alert alert-warning" role="status">
                <AlertTriangleIcon />
                <div>
                  <div className="alert-title">Planned / Future Capability</div>
                  <div className="alert-desc">This item is in current or future development.</div>
                </div>
              </div>
            )}
            <div className="alert alert-info">
              <InfoCircleIcon />
              <div>
                <div className="alert-title">Documentation</div>
                <div className="alert-desc">
                  {item.docURL
                    ? <a href={item.docURL} target="_blank" rel="noopener noreferrer">Open full documentation ↗</a>
                    : 'Full documentation available via the GPS portal.'}
                </div>
              </div>
            </div>
          </div>
        </div>
      </>
    );
  }

  // Scope filter (matches index.html)
  const SCOPE_MODES = [
    { value: 'Essential', label: 'Essential' },
    { value: 'Current',   label: 'Current capability' },
    { value: 'Future',    label: 'Future capability' },
  ];
  const SCOPE_RANK = { Essential: 1, Current: 2, Future: 3 };
  function filterByScope(items, mode) {
    const limit = SCOPE_RANK[mode] || 2;
    return items.filter(it => (SCOPE_RANK[it.scope || 'Current'] || 2) <= limit);
  }
  function ScopeToggle({ value, onChange }) {
    return (
      <div className="scope-toggle-wrap">
        <div className="scope-toggle" role="tablist" aria-label="View scope">
          {SCOPE_MODES.map(m => (
            <button key={m.value} type="button" role="tab"
              aria-selected={value === m.value}
              className={'scope-toggle-trigger' + (value === m.value ? ' active' : '')}
              onClick={() => onChange(m.value)}>{m.label}</button>
          ))}
        </div>
      </div>
    );
  }

  function Visual({ data }) {
    const [selected, setSelected] = React.useState(null);
    const [accent, setAccent] = React.useState(null);
    const [scope, setScope] = React.useState('Current');
    const sec = s => filterByScope(data.itemsBySection[s] || [], scope);
    const { settings } = data;
    const onSelect = (it, a) => { setSelected(it); setAccent(a); };
    const isActive = it => selected && selected.name === it.name;
    const noteText = (settings.AsterisksNote || '* In current/future development').replace(/^\s*\*\s*/, '');

    return (
      <>
        <header className="gps-titleblock">
          <h1 className="gps-title">{settings.Title || 'GPS Ecosystem'}</h1>
          <p className="gps-definition">{settings.Definition}</p>
        </header>

        <ScopeToggle value={scope} onChange={setScope} />

        <div className="gps-grid">
          <Rail title="Who It Serves" subtitle={settings.AudiencesSubtitle} accentHsl={ACCENT_HSL['Audiences']}>
            {sec('Audiences').map((p, i) => <Tile key={`u-${i}`} item={p} accentHsl={ACCENT_HSL['Audiences']} isActive={isActive(p)} onSelect={onSelect} />)}
          </Rail>

          <div className="gps-center-stack">
            <Band title="Tools & Applications" subtitle={settings.ToolsSubtitle} accentHsl={ACCENT_HSL['Tools & Apps']}>
              {[...sec('Tools & Apps'), ...sec('Outputs')].map((it, i) => <Tile key={`t-${i}`} item={it} accentHsl={ACCENT_HSL['Tools & Apps']} isActive={isActive(it)} onSelect={onSelect} />)}
            </Band>
            <Band title="Data Services" subtitle={settings.DataServicesSubtitle} accentHsl={ACCENT_HSL['Data Services']}>
              {[...sec('Data Services'), ...sec('Inputs')].map((it, i) => <Tile key={`d-${i}`} item={it} accentHsl={ACCENT_HSL['Data Services']} isActive={isActive(it)} onSelect={onSelect} />)}
            </Band>
            <Band title="Foundation" subtitle={settings.FoundationSubtitle} accentHsl={ACCENT_HSL['Foundation']}>
              <div className="tile-grid-4col">
                {sec('Foundation').map((it, i) => <Tile key={`f-${i}`} item={it} accentHsl={ACCENT_HSL['Foundation']} isActive={isActive(it)} onSelect={onSelect} />)}
              </div>
            </Band>
          </div>

          <Rail title="Governance" subtitle={settings.GovernanceSubtitle} accentHsl={ACCENT_HSL['Governance']}>
            {sec('Governance').map((g, i) => <Tile key={`g-${i}`} item={g} accentHsl={ACCENT_HSL['Governance']} isActive={isActive(g)} onSelect={onSelect} />)}
          </Rail>
        </div>

        <Legend />

        <div className="gps-footnote">
          <span className="future-star">*</span> {noteText}
        </div>

        <DetailDialog item={selected} accentHsl={accent} onClose={() => setSelected(null)} />
      </>
    );
  }

  function App() {
    const [data, setData] = React.useState(null);
    const [error, setError] = React.useState(null);
    const [fileName, setFileName] = React.useState(null);
    const [fileBlob, setFileBlob] = React.useState(null);
    const [over, setOver] = React.useState(false);

    async function handleFile(file) {
      if (!file) return;
      try {
        const buf = await file.arrayBuffer();
        const parsed = parseWorkbook(buf);
        setData(parsed);
        setFileName(file.name);
        setFileBlob(new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }));
        setError(null);
      } catch (e) {
        setError(e.message || String(e));
      }
    }
    function onDrop(e) { e.preventDefault(); setOver(false); handleFile(e.dataTransfer.files && e.dataTransfer.files[0]); }
    function onPicked(e) { handleFile(e.target.files && e.target.files[0]); }
    function downloadAsDataXlsx() {
      if (!fileBlob) return;
      const url = URL.createObjectURL(fileBlob);
      const a = document.createElement('a');
      a.href = url; a.download = 'data.xlsx'; a.click();
      URL.revokeObjectURL(url);
    }
    function reset() { setData(null); setFileName(null); setFileBlob(null); setError(null); }

    if (!data) {
      return (
        <div className={'pub-dropzone' + (over ? ' over' : '')}
          onDragOver={e => { e.preventDefault(); setOver(true); }}
          onDragLeave={() => setOver(false)}
          onDrop={onDrop}>
          <h2>Preview &amp; Publish</h2>
          <p>Drop your <strong>GPS-Ecosystem.xlsx</strong> here to preview the visual, then download it as <code>data.xlsx</code> to upload to the public host.</p>
          <input id="filepick" className="pub-filepicker" type="file"
            accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
            onChange={onPicked} />
          <label htmlFor="filepick" className="pub-pick-label">Pick a file…</label>
          {error && (
            <div className="gps-state error" style={{ padding: '20px 0 0' }}>
              Couldn't read that file. <small>({error})</small>
            </div>
          )}
          <div className="pub-filehint">This page never uploads anything — the file is parsed entirely in your browser.</div>
        </div>
      );
    }

    return (
      <div>
        <div className="pub-banner">
          <div className="pub-banner-text">
            <strong>Preview</strong> of <span className="pub-filename">{fileName}</span> — this is exactly what viewers will see.
          </div>
          <div className="pub-banner-actions">
            <button type="button" className="btn btn-outline" onClick={reset}>Load a different file</button>
            <button type="button" className="btn btn-primary" onClick={downloadAsDataXlsx}>Download as data.xlsx ↓</button>
          </div>
        </div>
        <Visual data={data} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
